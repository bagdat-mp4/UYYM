<!DOCTYPE html><html lang="kk"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uyym — Кіру</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{
  --bg:#0C0C0E; --bg2:#161619; --card:#1C1C21; --card2:#232329;
  --line:#2A2A31; --txt:#FFFFFF; --mut:#9A9AA5; --dim:#6E6E78;
  --red:#E62E2E; --red-deep:#C81E1E; --red-tint:rgba(230,46,46,.14);
  --gold:#F2A93B; --green:#3DBE5B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{background:#000;display:flex;justify-content:center;padding:0;font-family:'Inter',Arial,sans-serif}
.phone{width:375px;min-height:812px;background:var(--bg);color:var(--txt);position:relative;padding-bottom:92px}
h1,h2,h3,.logo-word{font-family:'Poppins','Inter',sans-serif}
/* status bar */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 6px;font-weight:700;font-size:15px}
.status .r{display:flex;gap:5px;align-items:center;font-size:11px;color:var(--mut)}
/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px}
.hdr .ttl{font-family:'Poppins';font-weight:700;font-size:17px;position:absolute;left:50%;transform:translateX(-50%)}
.hicon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red)}
/* tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-top:4px}
.tab{flex:1;text-align:center;padding:12px 0 11px;font-size:15px;font-weight:700;color:var(--mut);position:relative}
.tab.on{color:var(--txt)}
.tab.on::after{content:"";position:absolute;left:22%;right:22%;bottom:-1px;height:3px;border-radius:99px;background:var(--red)}
.tab .dot2{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-left:5px;vertical-align:middle}
/* chips */
.chips{display:flex;gap:9px;padding:14px 18px;overflow:hidden}
.chip{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);color:var(--txt);
  border-radius:99px;padding:9px 15px;font-size:13.5px;font-weight:600;white-space:nowrap;background:var(--bg2)}
.chip.on{border-color:var(--red);color:var(--red);background:var(--red-tint)}
/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 36px);margin:0 18px;
  padding:15px;border-radius:99px;border:none;font-family:'Inter';font-size:15.5px;font-weight:700;cursor:pointer}
.btn-red{background:var(--red);color:#fff}
.btn-line{background:transparent;color:var(--txt);border:1.5px solid var(--line)}
/* cards */
.card{background:var(--card);border-radius:16px;margin:0 18px 14px;overflow:hidden}
.pad{padding:16px}
.avatar{border-radius:50%;background:var(--red);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:'Poppins';flex:0 0 auto}
.av-s{width:34px;height:34px;font-size:13px}.av-m{width:44px;height:44px;font-size:16px}.av-b{width:64px;height:64px;font-size:22px}
.blue{background:#3D6BDB}.green{background:#2F9E44}.gold{background:var(--gold)}.ink{background:#3A3A44}
.vf{color:var(--red);font-weight:800;font-size:12px}
.mut{color:var(--mut)}
.sec{font-family:'Poppins';font-weight:700;font-size:17px;padding:6px 18px 12px}
/* bottom nav */
.bnav{position:absolute;left:0;right:0;bottom:0;background:#101013;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:flex-end;padding:8px 6px 18px}
.bitem{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--dim);width:64px;position:relative}
.bitem.on{color:var(--red)}
.bitem.on svg *{stroke:var(--red)}
.bitem .bdg{position:absolute;top:-5px;right:12px;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:1px 6px}
.rec{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 4px 16px rgba(230,46,46,.4)}

.lg-wrap{padding:26px 18px 0;display:flex;flex-direction:column;min-height:700px}
.lg-hero{display:flex;flex-direction:column;align-items:center;padding:34px 0 30px}
.lg-hero h1{font-size:30px;font-weight:800;letter-spacing:2px;margin-top:16px}
.lg-hero p{color:var(--mut);font-size:14px;margin-top:6px}
label{font-size:12.5px;font-weight:700;color:var(--mut);display:block;margin-bottom:7px}
input{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:14px;color:#fff;
  padding:15px 16px;font-size:15px;font-family:'Inter';outline:none;margin-bottom:16px}
input::placeholder{color:var(--dim)}
.fgt{text-align:right;font-size:13px;color:var(--red);font-weight:700;margin:-6px 0 18px}
.dvd{display:flex;align-items:center;gap:12px;color:var(--dim);font-size:12.5px;margin:18px 0}
.dvd::before,.dvd::after{content:"";flex:1;height:1px;background:var(--line)}
.reg{text-align:center;font-size:14px;color:var(--mut);margin-top:22px}
.reg b{color:var(--red)}
</style></head>
<body><div class="phone">
<div class="status"><span>21:50</span><span class="r">▮▮▯ ⌁ 🔋</span></div>
<div class="lg-wrap">
  <div class="lg-hero">
    <svg width="88" height="88" viewBox="0 0 120 120"><rect width="120" height="120" rx="26" fill="#E62E2E"/><g stroke="#fff" stroke-width="5" stroke-linecap="round">
<line x1="60" y1="60" x2="32" y2="36"/><line x1="60" y1="60" x2="90" y2="38"/>
<line x1="60" y1="60" x2="40" y2="90"/><line x1="60" y1="60" x2="88" y2="86"/></g>
<g fill="#fff"><circle cx="32" cy="36" r="7"/><circle cx="90" cy="38" r="7"/>
<circle cx="40" cy="90" r="7"/><circle cx="88" cy="86" r="7"/><circle cx="60" cy="60" r="12"/></g></svg>
    <h1>UYYM</h1><p>студенттер бір жерде</p>
  </div>
  <label>Электрондық пошта</label>
  <input placeholder="student@kbtu.kz">
  <label>Құпиясөз</label>
  <input type="password" placeholder="••••••••">
  <div class="fgt">Құпиясөзді ұмыттың ба?</div>
  <button class="btn btn-red" style="width:100%;margin:0">Кіру</button>
  <div class="dvd">немесе</div>
  <button class="btn btn-line" style="width:100%;margin:0">Google арқылы жалғастыру</button>
  <p class="reg">Аккаунтың жоқ па? <b>Тіркелу</b></p>
</div></div></body></html>
