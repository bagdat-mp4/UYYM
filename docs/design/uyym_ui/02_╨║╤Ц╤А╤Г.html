<!DOCTYPE html><html lang="kk"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uyym — Кіру</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#DC2626; --red-dark:#B91C1C; --red-tint:#FDECEC; --red-soft:#F9D5D5;
  --ink:#1E2430; --ink-2:#3A4354; --muted:#69728A; --line:#E4E8F0;
  --paper:#FFFFFF; --fog:#F4F6FA; --gold:#E8A020;
  --r-lg:20px; --r-md:14px; --r-sm:10px;
  --shadow:0 1px 2px rgba(30,36,48,.05),0 8px 24px rgba(30,36,48,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',Arial,sans-serif;color:var(--ink);background:var(--fog);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
body.dark{--paper:#1B1B20;--fog:#0D0D10;--ink:#FFFFFF;--ink-2:#D7DAE2;--muted:#9BA0B0;--line:#2B2B33;
  --red-tint:rgba(230,46,46,.16);--red-soft:#4A2020;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.35)}
h1,h2,h3,.brand,.logo-word{font-family:'Poppins','Inter',sans-serif}
a{text-decoration:none;color:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:15px;
  padding:12px 22px;border-radius:12px;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-dark{background:var(--ink);color:#fff}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--red);
  background:var(--red-tint);border-radius:99px;padding:5px 12px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow)}
input,select,textarea{font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);
  border:1.5px solid var(--line);border-radius:12px;padding:13px 16px;width:100%;background:var(--paper);outline:none}
input::placeholder,textarea::placeholder{color:#9AA3B8}
label{font-size:13px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:6px}
.field{margin-bottom:16px}
/* --- логотип --- */
.logo{display:flex;align-items:center;gap:10px}
.logo-word{font-weight:700;font-size:22px;letter-spacing:1px;color:var(--ink)}
.logo-word.on-red{color:#fff}
/* --- app shell --- */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidenav{background:var(--paper);border-right:1px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.sidenav .logo{padding:0 10px 18px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;font-size:15px;font-weight:500;color:var(--ink-2)}
.nav-item svg{flex:0 0 auto}
.nav-item.active{background:var(--red-tint);color:var(--red);font-weight:600}
.nav-item.active svg *{stroke:var(--red)}
.nav-spacer{flex:1}
.me{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--line)}
.me .name{font-size:14px;font-weight:600}
.me .sub{font-size:12px;color:var(--muted)}
.main{padding:26px 32px;max-width:1140px;width:100%}
.topbar{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.search{flex:1;position:relative}
.search input{padding-left:44px;border-radius:99px;background:var(--paper)}
.search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%)}
.avatar{border-radius:50%;background:var(--red);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:'Poppins',sans-serif;flex:0 0 auto}
.av-sm{width:36px;height:36px;font-size:14px}
.av-md{width:44px;height:44px;font-size:16px}
.av-lg{width:56px;height:56px;font-size:20px}
.av-blue{background:#3B5BDB}.av-green{background:#2F9E44}.av-gold{background:var(--gold)}.av-ink{background:var(--ink-2)}
.uni-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2);
  background:var(--fog);border:1px solid var(--line);border-radius:8px;padding:4px 9px}
.verified{color:var(--red);font-size:12px;font-weight:700}
.section-title{font-size:17px;font-weight:700;margin-bottom:14px}
.mut{color:var(--muted)}
/* --- тіл ауыстырғыш --- */
.lang{display:inline-flex;align-items:center;background:var(--fog);border:1px solid var(--line);border-radius:99px;padding:3px;gap:2px}
.lang span{font-size:12px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:99px;cursor:pointer}
.lang span.on{background:var(--red);color:#fff}
.lang.dark-l{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.lang.dark-l span{color:rgba(255,255,255,.75)}
.lang.dark-l span.on{background:#fff;color:var(--red)}

.auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.auth-side{background:var(--red);color:#fff;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:44px 52px;overflow:hidden}
.auth-side h2{font-size:34px;line-height:1.25;max-width:380px;position:relative}
.auth-side .q{position:relative;font-size:15px;opacity:.9;max-width:360px;line-height:1.6}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px;background:var(--paper)}
.auth-box{width:100%;max-width:400px}
.auth-box h1{font-size:26px;margin:22px 0 6px}
.auth-box .sub{color:var(--muted);font-size:14.5px;margin-bottom:26px}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px;margin:20px 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.link{color:var(--red);font-weight:600}
.forgot{font-size:13px;text-align:right;margin-top:-8px;margin-bottom:16px}
</style></head><body>
<div class="auth">
  <div class="auth-side"><svg class="constel" viewBox="0 0 1440 560" preserveAspectRatio="xMidYMid slice">
<g stroke="#fff" stroke-width="2.5" stroke-linecap="round">
<line x1="140" y1="120" x2="330" y2="70"/><line x1="330" y1="70" x2="410" y2="240"/><line x1="140" y1="120" x2="250" y2="330"/>
<line x1="250" y1="330" x2="410" y2="240"/><line x1="1120" y1="90" x2="1300" y2="170"/><line x1="1300" y1="170" x2="1210" y2="360"/>
<line x1="1120" y1="90" x2="1210" y2="360"/><line x1="980" y1="420" x2="1210" y2="360"/><line x1="620" y1="480" x2="820" y2="520"/></g>
<g fill="#fff"><circle cx="140" cy="120" r="9"/><circle cx="330" cy="70" r="7"/><circle cx="410" cy="240" r="8"/>
<circle cx="250" cy="330" r="7"/><circle cx="1120" cy="90" r="8"/><circle cx="1300" cy="170" r="7"/>
<circle cx="1210" cy="360" r="9"/><circle cx="980" cy="420" r="7"/><circle cx="620" cy="480" r="7"/><circle cx="820" cy="520" r="8"/></g></svg>
    <div class="logo" style="position:relative"><svg width="40" height="40" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
<rect width="120" height="120" rx="26" fill="#DC2626"/>
<g stroke="#fff" stroke-width="5" stroke-linecap="round">
<line x1="60" y1="60" x2="32" y2="36"/><line x1="60" y1="60" x2="90" y2="38"/>
<line x1="60" y1="60" x2="40" y2="90"/><line x1="60" y1="60" x2="88" y2="86"/></g>
<g fill="#fff"><circle cx="32" cy="36" r="7"/><circle cx="90" cy="38" r="7"/>
<circle cx="40" cy="90" r="7"/><circle cx="88" cy="86" r="7"/><circle cx="60" cy="60" r="12"/></g></svg><span class="logo-word on-red" style="font-size:24px">UYYM</span></div>
    <h2>Қайта қош келдің! Желі сені күтіп тұр.</h2>
    <p class="q">«Uyym арқылы Сатпаевтағы командамды таптым — хакатонда 2-орын алдық.»<br><b>— Аружан, КБТУ, 3-курс</b></p>
  </div>
  <div class="auth-form"><div class="auth-box">
    <div style="display:flex;justify-content:flex-end;gap:10px"><div class="lang"><span class="on">ҚАЗ</span><span>РУС</span><span>ENG</span></div><button onclick="document.body.classList.toggle('dark')" title="Тақырып" style="width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#69728A" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.6M12 18.9v2.6M2.5 12h2.6M18.9 12h2.6M5 5l1.8 1.8M17.2 17.2 19 19M19 5l-1.8 1.8M6.8 17.2 5 19"/></svg>
</button></div>
    <h1>Кіру</h1>
    <p class="sub">Uyym аккаунтыңа кір</p>
    <div class="field"><label>Электрондық пошта</label><input type="email" placeholder="student@kbtu.kz"></div>
    <div class="field"><label>Құпиясөз</label><input type="password" placeholder="••••••••"></div>
    <p class="forgot"><a class="link" href="#">Құпиясөзді ұмыттың ба?</a></p>
    <button class="btn btn-red" style="width:100%">Кіру</button>
    <div class="divider">немесе</div>
    <button class="btn btn-ghost" style="width:100%">Google арқылы кіру</button>
    <p style="text-align:center;font-size:14px;margin-top:22px">Аккаунтың жоқ па? <a class="link" href="#">Тіркелу</a></p>
  </div></div>
</div></body></html>
